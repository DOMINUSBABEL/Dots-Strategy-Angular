<div class="game-container" 
     (mousemove)="onTouchMove($event)" 
     (mouseup)="onTouchEnd($event)" 
     (touchmove)="onTouchMove($event)" 
     (touchend)="onTouchEnd($event)"
     (wheel)="onWheel($event)"
     (mousedown)="onTouchStart($event)"
     (touchstart)="onTouchStart($event)">

  <!-- SPLASH SCREEN -->
  <div *ngIf="showSplash" class="splash-screen" @splashFade>
    <div class="splash-content">
      <h1 class="game-title">DOTS STRATEGY</h1>
      <p class="developed-by">Desarrollado por</p>
      <a class="babylon-link" (click)="openBabylon()">BABYLON.IA</a>
    </div>
  </div>

  <!-- MAIN MENU -->
  <div *ngIf="!showSplash && gameState === 'menu'" class="menu-screen">
    <h1 class="game-title neon-text">DOTS</h1>
    <button class="btn-play" (click)="startGame('player')">Campaña Táctica</button>
    <button class="btn-play btn-sim" (click)="startGame('simulation')">Simulador IAs</button>
    <button class="btn-secondary" (click)="openBabylon()">Créditos a BABYLON.IA</button>
  </div>

  <!-- GAME OVER -->
  <div *ngIf="!showSplash && gameState === 'gameover'" class="menu-screen">
    <h1 class="game-title neon-text">{{ getWinner() }}</h1>
    <button class="btn-play" (click)="startGame('player')">Jugar de Nuevo</button>
    <button class="btn-secondary" (click)="gameState = 'menu'">Menú Principal</button>
  </div>

  <!-- TACTICAL HUD -->
  <div *ngIf="!showSplash && gameState === 'playing'" class="tactical-hud">
    <div class="hud-panel">
      <span>Enviar: </span>
      <button [class.active]="sendPercentage === 0.25" (click)="setPercentage(0.25)">25%</button>
      <button [class.active]="sendPercentage === 0.5" (click)="setPercentage(0.5)">50%</button>
      <button [class.active]="sendPercentage === 1.0" (click)="setPercentage(1.0)">100%</button>
    </div>
  </div>

  <!-- PLAYING FIELD CAMERA (PAN & ZOOM) -->
  <div *ngIf="!showSplash && (gameState === 'playing' || gameState === 'simulation')" 
       class="playing-field"
       [style.transform]="'translate(' + panX + 'px, ' + panY + 'px) scale(' + scale + ')'"
       [style.width.px]="MAP_WIDTH"
       [style.height.px]="MAP_HEIGHT">
    
    <!-- Map Bounds Border -->
    <div class="map-bounds" [style.width.px]="MAP_WIDTH" [style.height.px]="MAP_HEIGHT"></div>

    <!-- Drag Line -->
    <svg class="drag-line-layer" *ngIf="isLineDragging && selectedNode">
      <line 
        [attr.x1]="selectedNode.x" 
        [attr.y1]="selectedNode.y" 
        [attr.x2]="dragCurrentX" 
        [attr.y2]="dragCurrentY" 
        stroke="#4fc3f7" 
        stroke-width="8" 
        stroke-dasharray="16,16"/>
    </svg>

    <!-- Troop Movements -->
    <div *ngFor="let m of movements" 
         class="troop-swarm"
         [ngClass]="['swarm-' + m.owner, 'swarm-' + m.unitType, m.combating ? 'combating' : '']"
         [style.left.px]="m.startX + ((m.targetX - m.startX) * (m.progress / m.totalDistance))"
         [style.top.px]="m.startY + ((m.targetY - m.startY) * (m.progress / m.totalDistance))">
      {{ formatTroops(m.amount) }}
      <div *ngIf="m.unitType === 'heavy'" class="heavy-indicator">🛡️</div>
    </div>

    <!-- Nodes -->
    <div *ngFor="let node of nodes" 
         class="node"
         [ngClass]="['node-' + node.owner, 'type-' + node.type]"
         [class.selected]="selectedNode?.id === node.id"
         [style.left.px]="node.x"
         [style.top.px]="node.y">
      
      <!-- Pulsing Node Inner Body -->
      <div class="node-inner" [class.combating-node]="node.pushX !== 0 || node.pushY !== 0">
        <span class="troop-count">{{ formatTroops(node.troops) }}</span>
        
        <!-- Upgrade Button for Player -->
        <div *ngIf="node.owner === 'player' && node.level < 5 && node.type !== 'camp'" 
             class="upgrade-btn" 
             (click)="upgradeNode(node, $event)"
             (touchstart)="upgradeNode(node, $event)">
             LVL {{node.level}} <br> ⬆️ {{getCost(node)}}
        </div>
      </div>
      
      <!-- Node Status UI (Capacity warnings) -->
      <div class="node-status" *ngIf="node.troops > node.capacity">
        ⚠️ Lleno
      </div>
    </div>
  </div>

</div>
